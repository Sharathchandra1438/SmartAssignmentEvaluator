<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

{% include 'navbar.html' %}

<h1>Student Dashboard</h1>

<div class="container">
    <input id="name" placeholder="Student Name">
    <input id="roll" placeholder="Roll Number">
</div>

<div class="container">
    <h2>Upload Assignment</h2>
    <select id="assignment">
        <option>Loading...</option>
    </select>
    <input type="file" id="file">
    <button onclick="submitAssignment()">Submit Assignment</button>
</div>

<div class="container">
    <h2>Result</h2>
    <div id="result" class="resultBox">No submission yet</div>
</div>

<script>
const API_URL = window.location.hostname.includes("localhost")
    ? "http://127.0.0.1:8000"
    : "https://<YOUR_BACKEND_URL>";

let userData = localStorage.getItem("user");
if(!userData){
    window.location="/login";
}
let user = JSON.parse(userData);

// MARKS CALCULATION
function calculateMarks(score, pages){
    score=parseFloat(score)
    pages=parseInt(pages)
    if(score===0) return 0
    if(score<5 && pages<5) return 1
    if(score>=5 && score<10 && pages>=3) return 2
    if(score>=10 && score<30 && pages>=5) return 3
    if(score>=30 && score<60 && pages>=7) return 4
    if(score>=60 && pages>=10) return 5
    return 3
}

// LOAD ASSIGNMENTS
async function loadAssignments(){
    try{
        let res = await fetch(`${API_URL}/assignments`);
        let data = await res.json();
        let select = document.getElementById("assignment");
        select.innerHTML = "<option>Select Assignment</option>";
        data.forEach(a=>{
            let option = document.createElement("option");
            option.value = a.id;
            option.text = a.title;
            select.appendChild(option);
        });
    } catch(err){
        alert("Failed to load assignments. Check backend.");
        console.error(err);
    }
}
loadAssignments();

// SUBMIT ASSIGNMENT
async function submitAssignment(){
    let fileInput = document.getElementById("file");
    if(fileInput.files.length === 0){
        alert("Please select a file to upload.");
        return;
    }

    let formData = new FormData();
    formData.append("studentName", document.getElementById("name").value);
    formData.append("rollNo", document.getElementById("roll").value);
    formData.append("assignmentId", document.getElementById("assignment").value);
    formData.append("file", fileInput.files[0]);

    try{
        let res = await fetch(`${API_URL}/submitAssignment`, { method:"POST", body: formData });
        if(!res.ok){
            alert("Server error: " + res.status);
            return;
        }
        let data = await res.json();
        let marks = calculateMarks(data.score, data.pages);
        document.getElementById("result").innerHTML = `
            <b>Student Name:</b> ${data.studentName}<br><br>
            <b>Roll Number:</b> ${data.rollNo}<br><br>
            <b>Writer Name:</b> ${data.writerName}<br><br>
            <b>Pages:</b> ${data.pages}<br><br>
            <b>Similarity Score:</b> ${data.score} %<br><br>
            <b>Marks:</b> ${marks} / 5
        `;
    } catch(err){
        alert("Failed to submit assignment. Check backend or network.");
        console.error(err);
    }
}
</script>

</body>
</html>
